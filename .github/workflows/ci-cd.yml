name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install backend dependencies
        run: uv sync --locked --dev

      - name: Run backend tests
        run: uv run python -m unittest discover -s tests -v

  backend-integration-tests:
    name: Backend integration tests
    runs-on: ubuntu-latest
    needs:
      - frontend-tests
      - backend-tests
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install backend dependencies
        run: uv sync --locked --dev

      - name: Run backend integration tests
        run: uv run python -m unittest discover -s tests_integration -v

  # TODO: Enable this job once a real deployment target exists.
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs:
      - backend-integration-tests
    if: ${{ false }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: eu-west-1
          # TODO: Replace with the IAM role GitHub Actions should assume.
          role-to-assume: arn:aws:iam::<account-id>:role/<github-actions-oidc-role>

      - name: Deploy application
        run: |
          echo "TODO: add the deployment target and deploy command."
          echo "This job is intentionally disabled until deployment infrastructure exists."
