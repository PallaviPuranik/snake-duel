services:
  postgres:
    image: postgres:16-alpine
    container_name: snake-db
    environment:
      POSTGRES_USER: snakearena
      POSTGRES_PASSWORD: snakearena
      POSTGRES_DB: snakearena
    ports:
      - "5432:5432"
    volumes:
      - snake_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snakearena -d snakearena"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://snakearena:snakearena@postgres:5432/snakearena
    ports:
      - "8000:8000"

volumes:
  snake_pgdata:
